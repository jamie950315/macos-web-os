services:
  macos-web-os:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    image: macos-web-os:latest
    container_name: macos-web-os-container
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3333/health"]
      interval: 30s
      timeout: 3s
      retries: 3
