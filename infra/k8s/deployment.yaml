apiVersion: apps/v1
kind: Deployment
metadata:
  name: macos-web-os
  namespace: macos-production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: macos-web
  template:
    metadata:
      labels:
        app: macos-web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      containers:
      - name: macos-web
        image: macos-web-os:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: KERNEL_VERSION
          value: "14.3.0"
        - name: NODE_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: macos-web-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: macos-web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: macos-web-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - macos-web.example.com
    secretName: macos-web-tls
  rules:
  - host: macos-web.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: macos-web-service
            port:
              number: 80
